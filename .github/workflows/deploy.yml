name: 🚀 Automated Deployment

on:
  push:
    branches:
      - main
      - master
      - production
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: '18.x'
  PYTHON_VERSION: '3.10'

jobs:
  # ============================================
  # Build & Test
  # ============================================
  build-and-test:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json

      - name: 📦 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 🔧 Install Dependencies
        run: npm ci

      - name: ✅ Lint
        run: npm run lint || true

      - name: 🏗️ Build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:5000' }}
        run: npm run build

      - name: ✅ Run Tests (if available)
        run: npm test || echo "No tests configured"

      - name: 💾 Cache Build Artifacts
        uses: actions/cache@v4
        with:
          path: |
            .next
            node_modules
          key: ${{ runner.os }}-build-${{ github.sha }}

  # ============================================
  # Security Scan
  # ============================================
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔒 Run npm audit
        run: npm audit --audit-level=moderate || true

  # ============================================
  # Docker Build
  # ============================================
  docker-build:
    name: 🐳 Build Docker Images
    runs-on: ubuntu-latest
    needs: [build-and-test, security-scan]
    if: github.event_name != 'pull_request'
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

      - name: 🏗️ Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
          tags: |
            harvics/app:latest
            harvics/app:${{ github.sha }}
          cache-from: type=registry,ref=harvics/app:buildcache
          cache-to: type=registry,ref=harvics/app:buildcache,mode=max

  # ============================================
  # Deploy to Staging
  # ============================================
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker-build
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      github.event_name != 'pull_request'
    environment:
      name: staging
      url: ${{ secrets.STAGING_URL }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Deploy to Staging Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /var/www/harvics
            git pull origin main
            ./deploy.sh staging
            docker-compose -f docker-compose.staging.yml up -d --build
            docker-compose -f docker-compose.staging.yml restart

      - name: ✅ Health Check
        run: |
          sleep 10
          curl -f ${{ secrets.STAGING_URL }}/api/health || exit 1

  # ============================================
  # Deploy to Production
  # ============================================
  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/production') &&
      github.event_name == 'push'
    environment:
      name: production
      url: ${{ secrets.PRODUCTION_URL }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔔 Notify Deployment Start
        run: |
          echo "🚀 Starting production deployment..."
          # Add Slack/Discord/Email notification here

      - name: 🚀 Deploy to Production Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd /var/www/harvics
            git pull origin main
            ./deploy.sh production
            docker-compose -f docker-compose.production.yml up -d --build
            docker-compose -f docker-compose.production.yml restart

      - name: ✅ Production Health Check
        run: |
          sleep 15
          curl -f ${{ secrets.PRODUCTION_URL }}/api/health || exit 1

      - name: 🔔 Notify Deployment Success
        if: success()
        run: |
          echo "✅ Production deployment successful!"
          # Add success notification here

      - name: 🔔 Notify Deployment Failure
        if: failure()
        run: |
          echo "❌ Production deployment failed!"
          # Add failure notification here

