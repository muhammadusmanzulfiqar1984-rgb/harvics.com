<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Playlist Test — HARVICS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0406;
      color: #fff;
      font-family: 'Georgia', serif;
      height: 100vh;
      overflow: hidden;
    }

    /* ── backdrop ── */
    #backdrop {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .vid {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 1.5s ease;
    }

    #vid-a { opacity: 1; }
    #vid-b { opacity: 0; }

    /* dark gradient overlay so text is readable */
    #overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.55) 0%,
        rgba(0,0,0,0.25) 50%,
        rgba(0,0,0,0.65) 100%
      );
    }

    /* ── HUD ── */
    #hud {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 1.5rem;
      text-align: center;
      padding: 2rem;
    }

    .label {
      font-size: 0.6rem;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: rgba(200,169,110,0.6);
    }

    h1 {
      font-size: clamp(1.6rem, 4vw, 3.2rem);
      font-weight: 200;
      color: #c8a96e;
      letter-spacing: 0.08em;
    }

    /* status bar */
    #status-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding: 0.9rem 2rem;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      border-top: 1px solid rgba(200,169,110,0.15);
      font-size: 0.72rem;
      letter-spacing: 1px;
    }

    #status-bar .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4ade80;
      flex-shrink: 0;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    #now-playing { color: #c8a96e; flex: 1; }
    #clip-counter { color: rgba(255,255,255,0.4); }
    #clip-total   { color: rgba(255,255,255,0.25); }

    /* progress bar */
    #progress-wrap {
      position: fixed;
      bottom: 42px;
      left: 0;
      right: 0;
      z-index: 20;
      height: 2px;
      background: rgba(255,255,255,0.08);
    }
    #progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #c8a96e, #e8c97e);
      width: 0%;
      transition: width 0.25s linear;
    }

    /* error message */
    #error-msg {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%,-50%);
      z-index: 30;
      background: rgba(200,0,0,0.85);
      padding: 1.5rem 2rem;
      border-radius: 8px;
      font-size: 0.9rem;
      text-align: center;
      max-width: 400px;
    }
  </style>
</head>
<body>

  <div id="backdrop">
    <video id="vid-a" class="vid" muted playsinline></video>
    <video id="vid-b" class="vid" muted playsinline></video>
    <div id="overlay"></div>
  </div>

  <div id="hud">
    <p class="label">HARVICS × GENVIET — Runway Backdrop Test</p>
    <h1>Video Playlist Running</h1>
    <p class="label" id="load-state">Loading first clip…</p>
  </div>

  <div id="progress-wrap"><div id="progress-bar"></div></div>

  <div id="status-bar">
    <div class="dot"></div>
    <span id="now-playing">Initialising…</span>
    <span id="clip-counter">1</span>
    <span id="clip-total">/ 17</span>
  </div>

  <div id="error-msg"></div>

  <script>
  (function(){

    var playlist = [
      './Vedio/Runway.mp4',
      './Vedio/Runway7.mp4',
      './Vedio/Runway5.mp4',
      './Vedio/Runway1.mp4',
      './Vedio/Runway2.mp4',
      './Vedio/Runway3.mp4',
      './Vedio/Runway 8.mp4',
      './Vedio 1/Runway0.mp4',
      './Vedio 1/Runway1.mp4',
      './Vedio 1/Runway2.mp4',
      './Vedio 1/Runway4.mp4',
      './Vedio 1/Runway5.mp4',
      './Vedio 1/Runway6.mp4',
      './Vedio 1/Runway7.mp4',
      './Vedio 1/Runway8.mp4',
      './Vedio 1/Runway9.mp4',
      './Vedio 1/Runway10.mp4'
    ];

    /* shuffle */
    for(var i = playlist.length - 1; i > 0; i--){
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = playlist[i]; playlist[i] = playlist[j]; playlist[j] = tmp;
    }

    var idx      = 0;
    var busy     = false;
    var va       = document.getElementById('vid-a');
    var vb       = document.getElementById('vid-b');
    var current  = va;
    var standby  = vb;
    var rafId    = null;

    /* UI refs */
    var nowPlaying  = document.getElementById('now-playing');
    var clipCounter = document.getElementById('clip-counter');
    var clipTotal   = document.getElementById('clip-total');
    var progressBar = document.getElementById('progress-bar');
    var loadState   = document.getElementById('load-state');
    var errorMsg    = document.getElementById('error-msg');

    clipTotal.textContent = '/ ' + playlist.length;

    function fileName(src){
      return src.split('/').pop();
    }

    function updateHUD(){
      nowPlaying.textContent  = fileName(playlist[idx]);
      clipCounter.textContent = (idx + 1);
    }

    function updateProgress(){
      if(!current.duration || isNaN(current.duration)) return;
      var pct = (current.currentTime / current.duration) * 100;
      progressBar.style.width = pct + '%';
    }

    function safePlay(el){
      el.muted = true;
      return el.play().catch(function(e){
        console.warn('play() blocked:', e);
      });
    }

    function crossfade(){
      if(busy) return;
      busy = true;

      cancelAnimationFrame(rafId);

      idx = (idx + 1) % playlist.length;
      standby.src = playlist[idx];
      standby.load();

      var safety = setTimeout(function(){
        standby.oncanplay = null;
        console.warn('Timeout waiting for:', playlist[idx], '— skipping');
        busy = false;
        crossfade();
      }, 5000);

      standby.oncanplay = function(){
        standby.oncanplay = null;
        clearTimeout(safety);

        safePlay(standby);

        standby.style.opacity = '1';
        current.style.opacity = '0';

        var prev = current;
        current  = standby;
        standby  = prev;

        updateHUD();
        loadState.textContent = 'Playing';
        startProgress();

        setTimeout(function(){
          prev.pause();
          prev.removeAttribute('src');
          prev.load();
          busy = false;
        }, 1700);
      };
    }

    function startProgress(){
      cancelAnimationFrame(rafId);
      function tick(){
        updateProgress();
        rafId = requestAnimationFrame(tick);
      }
      rafId = requestAnimationFrame(tick);
    }

    current.addEventListener('ended', crossfade);
    standby.addEventListener('ended', crossfade);

    current.addEventListener('error', function(e){
      console.error('Video error on current:', playlist[idx], e);
      busy = false;
      crossfade();
    });

    /* boot */
    current.src = playlist[0];
    current.load();
    current.oncanplay = function(){
      current.oncanplay = null;
      safePlay(current).then(function(){
        loadState.textContent = 'Playing';
        updateHUD();
        startProgress();
      });
    };

    current.onerror = function(){
      loadState.textContent = 'Error loading first clip — check console';
      errorMsg.style.display = 'block';
      errorMsg.textContent   = 'Failed to load: ' + playlist[0] + '\n\nCheck that video files are in the Vedio/ and Vedio 1/ folders.';
    };

  })();
  </script>

</body>
</html>
