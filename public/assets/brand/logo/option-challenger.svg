<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- OPTION 3: The Challenger -->
  <!-- Concept: BOLD disruption - Breaking the enterprise mold -->
  <!-- "Better than SAP" = Don't look like enterprise software at all -->
  
  <!-- Single powerful H made from 10 elements stacked -->
  <!-- Fibonacci stack: 2, 3, 5 units creating dynamic H -->
  
  <!-- Left pillar (5 industries stacked) -->
  <rect x="14" y="10" width="8" height="8" fill="#6B1F2B"/>
  <rect x="14" y="19" width="8" height="5" fill="#8B3A47"/>
  <rect x="14" y="25" width="8" height="8" fill="#6B1F2B"/>
  <rect x="14" y="34" width="8" height="5" fill="#8B3A47"/>
  <rect x="14" y="40" width="8" height="14" fill="#6B1F2B"/>
  
  <!-- Crossbar (golden bridge) -->
  <rect x="22" y="27" width="20" height="6" fill="#C3A35E"/>
  <circle cx="32" cy="30" r="4" fill="#FFFFFF"/>
  <circle cx="32" cy="30" r="2" fill="#C3A35E"/>
  
  <!-- Right pillar (5 industries stacked) -->
  <rect x="42" y="10" width="8" height="14" fill="#6B1F2B"/>
  <rect x="42" y="25" width="8" height="5" fill="#8B3A47"/>
  <rect x="42" y="31" width="8" height="8" fill="#6B1F2B"/>
  <rect x="42" y="40" width="8" height="5" fill="#8B3A47"/>
  <rect x="42" y="46" width="8" height="8" fill="#6B1F2B"/>
  
  <!-- Gold accent corners (disruption marks) -->
  <path d="M6 6L12 6L6 12Z" fill="#C3A35E"/>
  <path d="M58 6L58 12L52 6Z" fill="#C3A35E"/>
  <path d="M6 58L6 52L12 58Z" fill="#C3A35E"/>
  <path d="M58 58L52 58L58 52Z" fill="#C3A35E"/>
</svg>
