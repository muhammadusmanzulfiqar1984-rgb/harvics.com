<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- HARVICS Strategic Logo: The Decagon Hub -->
  <!-- Concept: 10 industries (nodes) unified by one platform (center) -->
  <!-- Golden ratio: 1.618 applied to all proportions -->
  
  <!-- Central Hub (ONE platform) -->
  <circle cx="32" cy="32" r="6.18" fill="#C3A35E"/>
  
  <!-- 10 Industry Nodes (positioned at decagon vertices) -->
  <!-- Golden ratio spacing: 6.18 * 2.618 = 16.18px from center -->
  
  <!-- Node 1: FMCG (top) -->
  <circle cx="32" cy="12" r="3" fill="#6B1F2B"/>
  
  <!-- Node 2: Textiles (36° clockwise) -->
  <circle cx="44.1" cy="15.3" r="3" fill="#6B1F2B"/>
  
  <!-- Node 3: Commodities (72°) -->
  <circle cx="49.5" cy="25.4" r="3" fill="#6B1F2B"/>
  
  <!-- Node 4: Industrial (108°) -->
  <circle cx="46.8" cy="37.2" r="3" fill="#6B1F2B"/>
  
  <!-- Node 5: Minerals (144°) -->
  <circle cx="37.6" cy="45" r="3" fill="#6B1F2B"/>
  
  <!-- Node 6: Oil & Gas (180° - bottom) -->
  <circle cx="32" cy="52" r="3" fill="#6B1F2B"/>
  
  <!-- Node 7: Real Estate (216°) -->
  <circle cx="26.4" cy="45" r="3" fill="#6B1F2B"/>
  
  <!-- Node 8: Sourcing (252°) -->
  <circle cx="17.2" cy="37.2" r="3" fill="#6B1F2B"/>
  
  <!-- Node 9: Finance (288°) -->
  <circle cx="14.5" cy="25.4" r="3" fill="#6B1F2B"/>
  
  <!-- Node 10: AI & Tech (324°) -->
  <circle cx="19.9" cy="15.3" r="3" fill="#6B1F2B"/>
  
  <!-- Connection Lines (subtle - suggesting integration) -->
  <g opacity="0.15" stroke="#6B1F2B" stroke-width="1">
    <line x1="32" y1="12" x2="32" y2="25.82"/>
    <line x1="44.1" y1="15.3" x2="35.5" y2="28.2"/>
    <line x1="49.5" y1="25.4" x2="37.5" y2="31"/>
    <line x1="46.8" y1="37.2" x2="37.5" y2="35"/>
    <line x1="37.6" y1="45" x2="35" y2="37"/>
    <line x1="32" y1="52" x2="32" y2="38.18"/>
    <line x1="26.4" y1="45" x2="29" y2="37"/>
    <line x1="17.2" y1="37.2" x2="26.5" y2="35"/>
    <line x1="14.5" y1="25.4" x2="26.5" y2="31"/>
    <line x1="19.9" y1="15.3" x2="28.5" y2="28.2"/>
  </g>
</svg>
