<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- OPTION 2: The Universal Grid -->
  <!-- Concept: 10 modular blocks = Universal schema that transforms across industries -->
  <!-- Golden ratio: 3.82 × 1.618 = 6.18 (unit size) -->
  
  <!-- 3×3 grid + center = 10 modules -->
  <!-- Each represents one industry, equal and modular -->
  
  <!-- Row 1: FMCG, Textiles, Commodities -->
  <rect x="8" y="8" width="13" height="13" fill="#6B1F2B" rx="1.618"/>
  <rect x="25.5" y="8" width="13" height="13" fill="#6B1F2B" rx="1.618"/>
  <rect x="43" y="8" width="13" height="13" fill="#6B1F2B" rx="1.618"/>
  
  <!-- Row 2: Industrial, ONE PLATFORM (center), Minerals -->
  <rect x="8" y="25.5" width="13" height="13" fill="#6B1F2B" rx="1.618"/>
  <rect x="25.5" y="25.5" width="13" height="13" fill="#C3A35E" rx="1.618"/>
  <rect x="43" y="25.5" width="13" height="13" fill="#6B1F2B" rx="1.618"/>
  
  <!-- Row 3: Oil & Gas, Real Estate, Sourcing -->
  <rect x="8" y="43" width="13" height="13" fill="#6B1F2B" rx="1.618"/>
  <rect x="25.5" y="43" width="13" height="13" fill="#6B1F2B" rx="1.618"/>
  <rect x="43" y="43" width="13" height="13" fill="#6B1F2B" rx="1.618"/>
  
  <!-- Finance (bottom left corner detail) -->
  <circle cx="14.5" cy="58" r="2.618" fill="#C3A35E"/>
  
  <!-- AI & Tech (top right corner detail) -->
  <circle cx="49.5" cy="6" r="2.618" fill="#C3A35E"/>
</svg>
