<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Portfolio Trial — Full-Width Slides</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400&family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0d0d0d;
    --gold: #c8a96e;
    --gold-light: #e8cc8a;
    --text: #e8e0d0;
    --muted: rgba(232, 224, 208, 0.62);
    --border-soft: rgba(200, 169, 110, 0.25);
    --radius: 18px;
    --shell: min(1360px, calc(100vw - 48px));
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Manrope", system-ui, sans-serif;
  }
  .shell { width: var(--shell); margin: 0 auto; }
  .section { padding: 96px 0; }
  .eyebrow {
    margin: 0 0 14px;
    color: var(--gold-light);
    font-size: 0.68rem;
    font-weight: 400;
    letter-spacing: 0.24em;
    text-transform: uppercase;
  }
  .section-title {
    margin: 0 0 8px;
    font-size: clamp(2.2rem, 4vw, 3.6rem);
    font-weight: 300;
    line-height: 1.08;
    letter-spacing: 0.01em;
  }
  .lead {
    margin: 14px 0 0;
    color: var(--muted);
    font-size: 1.05rem;
    max-width: 60ch;
  }

  /* ───────── Trial: Option 1 — full-width slides ───────── */
  .pf-stack {
    margin-top: 56px;
    display: flex;
    flex-direction: column;
    gap: 56px;
  }
  .pf-slide {
    position: relative;
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    overflow: hidden;
    background: #141414;
    transition: transform 0.6s cubic-bezier(.22,.61,.36,1), border-color 0.6s ease, box-shadow 0.6s ease;
  }
  .pf-slide:hover {
    transform: translateY(-4px);
    border-color: var(--gold);
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.6);
  }
  .pf-slide__head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 24px;
    padding: 20px 28px 0;
  }
  .pf-slide__num {
    margin: 0;
    color: var(--gold);
    font-size: 0.62rem;
    font-weight: 400;
    letter-spacing: 0.32em;
    text-transform: uppercase;
  }
  .pf-slide__cta {
    appearance: none;
    background: transparent;
    border: 1px solid var(--border-soft);
    color: var(--gold-light);
    padding: 8px 16px;
    border-radius: 999px;
    font-size: 0.6rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color 0.3s ease, color 0.3s ease, background 0.3s ease;
  }
  .pf-slide__cta:hover {
    border-color: var(--gold);
    color: var(--bg);
    background: var(--gold);
  }
  .pf-slide__media {
    position: relative;
    margin: 16px 0 0;
    background: #000;
    overflow: hidden;
  }
  .pf-slide__media img {
    display: block;
    width: 100%;
    height: auto;
  }
  /* Subtle vignette to match site */
  .pf-slide__media::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      linear-gradient(180deg, rgba(0,0,0,0.18) 0%, transparent 18%, transparent 82%, rgba(0,0,0,0.22) 100%);
  }

  @media (max-width: 768px) {
    .pf-stack { gap: 36px; }
    .pf-slide__head { padding: 16px 18px 0; }
  }
</style>
</head>
<body>
  <section class="section">
    <div class="shell">
      <p class="eyebrow">Chapter X · Trial Preview</p>
      <h2 class="section-title">Product Portfolio</h2>
      <p class="lead">Trial layout — slides displayed full-width as editorial spreads. The PNG slides already contain titles, sub-titles, and product photos baked in, so HTML duplicates are removed.</p>

      <div class="pf-stack">
        <article class="pf-slide">
          <header class="pf-slide__head">
            <p class="pf-slide__num">01 · Apparel</p>
            <button class="pf-slide__cta" type="button">View Details</button>
          </header>
          <div class="pf-slide__media">
            <img src="assets/images/13_Leather-Knit-and-Sportswear.png" alt="Leather, Knit and Sportswear" />
          </div>
        </article>

        <article class="pf-slide">
          <header class="pf-slide__head">
            <p class="pf-slide__num">02 · Bottoms &amp; Workwear</p>
            <button class="pf-slide__cta" type="button">View Details</button>
          </header>
          <div class="pf-slide__media">
            <img src="assets/images/14_Denim-Chino-and-Work-Wear.png" alt="Denim, Chino and Work Wear" />
          </div>
        </article>

        <article class="pf-slide">
          <header class="pf-slide__head">
            <p class="pf-slide__num">03 · Footwear &amp; Home</p>
            <button class="pf-slide__cta" type="button">View Details</button>
          </header>
          <div class="pf-slide__media">
            <img src="assets/images/15_Footwear-and-Home-Textile.png" alt="Footwear and Home Textile" />
          </div>
        </article>

        <article class="pf-slide">
          <header class="pf-slide__head">
            <p class="pf-slide__num">04 · Overview</p>
            <button class="pf-slide__cta" type="button">View Details</button>
          </header>
          <div class="pf-slide__media">
            <img src="assets/optimized/12_Our-Product-Portfolio.avif" alt="Portfolio Overview" />
          </div>
        </article>
      </div>
    </div>
  </section>
</body>
</html>
