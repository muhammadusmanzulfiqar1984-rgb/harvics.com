<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LPP Presentation Access</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500&family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #c8a96e;
      --gold-light: #e8cc8a;
      --bg: #0d0d0d;
      --panel: rgba(13, 11, 8, 0.84);
      --text: #e8e0d0;
      --muted: rgba(232, 224, 208, 0.62);
      --border: rgba(200, 169, 110, 0.35);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 25%, rgba(200, 169, 110, 0.08), transparent 45%),
        radial-gradient(circle at 80% 70%, rgba(200, 169, 110, 0.06), transparent 45%),
        var(--bg);
      color: var(--text);
      font-family: "Manrope", system-ui, sans-serif;
      padding: 24px;
    }

    .gate {
      width: min(520px, 100%);
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: var(--radius);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 28px;
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.45);
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--gold-light);
      font-size: 0.66rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      font-weight: 400;
    }

    h1 {
      margin: 0 0 10px;
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(1.8rem, 4.2vw, 2.5rem);
      font-weight: 400;
      line-height: 1.08;
    }

    .sub {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.6;
    }

    form {
      display: grid;
      gap: 12px;
    }

    input {
      width: 100%;
      min-height: 48px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      padding: 0 18px;
      font-size: 0.95rem;
      outline: none;
    }

    input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 2px rgba(200, 169, 110, 0.15);
    }

    button {
      min-height: 48px;
      border-radius: 999px;
      border: 1px solid transparent;
      background: linear-gradient(110deg, var(--gold-light), var(--gold));
      color: #17120d;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 0.68rem;
      font-weight: 500;
      cursor: pointer;
    }

    .error {
      min-height: 1.2em;
      color: #e88f8f;
      font-size: 0.82rem;
      margin-top: 4px;
    }

    .hint {
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.76rem;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main class="gate" aria-labelledby="gate-title">
    <p class="eyebrow">Private Access</p>
    <h1 id="gate-title">LPP Board Presentation</h1>
    <p class="sub">Enter the access code to continue.</p>

    <form id="gate-form" autocomplete="off">
      <input id="passcode" type="password" placeholder="Access code" required />
      <button type="submit">Enter Presentation</button>
      <p class="error" id="error" aria-live="polite"></p>
    </form>

    <p class="hint">Admin note: change the code in <strong>login.html</strong> at <code>PRESENTATION_PASSCODE</code>.</p>
  </main>

  <script>
    // Update this value any time you want to rotate the presentation password.
    const PRESENTATION_PASSCODE = "lpp2026";
    const STORAGE_KEY = "lpp_presentation_access";

    const params = new URLSearchParams(window.location.search);
    const requestedNext = params.get("next") || "/textile-v2/lpp/index.html";
    const safeNext = requestedNext.startsWith("/textile-v2/lpp") ? requestedNext : "/textile-v2/lpp/index.html";

    if (sessionStorage.getItem(STORAGE_KEY) === "granted") {
      window.location.replace(safeNext);
    }

    const form = document.getElementById("gate-form");
    const input = document.getElementById("passcode");
    const error = document.getElementById("error");

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      if (input.value === PRESENTATION_PASSCODE) {
        sessionStorage.setItem(STORAGE_KEY, "granted");
        window.location.replace(safeNext);
        return;
      }
      error.textContent = "Incorrect code. Try again.";
      input.value = "";
      input.focus();
    });
  </script>
</body>
</html>
