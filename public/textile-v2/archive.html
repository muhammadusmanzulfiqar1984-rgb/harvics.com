<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harvics World Archive</title>
  <style>
    :root {
      --bg-a: #0f0d0b;
      --bg-b: #0a0908;
      --bg-c: #060505;
      --gold: #c8a96e;
      --gold-light: #e8cc8a;
      --text: #ece4d7;
      --muted: rgba(236, 228, 215, 0.56);
      --line: rgba(200, 169, 110, 0.35);
      --panel: rgba(17, 14, 10, 0.72);
      --danger: #e88374;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: "Manrope", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 45%, rgba(200, 169, 110, 0.08), rgba(0, 0, 0, 0) 42%),
        linear-gradient(180deg, var(--bg-a) 0%, var(--bg-b) 55%, var(--bg-c) 100%);
    }

    .screen {
      min-height: 100vh;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .screen.active { display: flex; }

    .shell {
      width: min(100%, 980px);
      text-align: center;
    }

    .eyebrow {
      margin: 0 0 10px;
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      color: var(--muted);
      text-transform: uppercase;
    }

    h1, h2 {
      margin: 0;
      font-weight: 300;
      letter-spacing: 0.01em;
    }

    h1 { font-size: clamp(2.3rem, 6vw, 4.6rem); }
    h2 { font-size: clamp(1.65rem, 4.2vw, 2.8rem); }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      letter-spacing: 0.14em;
      font-size: 0.74rem;
      text-transform: uppercase;
    }

    .line {
      height: 1px;
      width: min(720px, 100%);
      margin: 26px auto;
      background: linear-gradient(90deg, rgba(200, 169, 110, 0), var(--line), rgba(200, 169, 110, 0));
    }

    .play {
      width: 96px;
      height: 96px;
      border-radius: 999px;
      border: 1px solid rgba(200, 169, 110, 0.34);
      background: rgba(200, 169, 110, 0.04);
      color: var(--gold-light);
      font-size: 1.5rem;
      cursor: pointer;
      transition: transform .25s ease, border-color .25s ease, box-shadow .25s ease;
    }

    .play:hover {
      transform: translateY(-1px) scale(1.02);
      border-color: rgba(200, 169, 110, 0.65);
      box-shadow: 0 0 28px rgba(200, 169, 110, 0.18);
    }

    .cta {
      margin-top: 14px;
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      color: rgba(236, 228, 215, 0.42);
      text-transform: uppercase;
    }

    .pin-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 26px 0 8px;
      flex-wrap: wrap;
    }

    .pin-input {
      width: 46px;
      height: 52px;
      border-radius: 6px;
      border: 2px solid rgba(200, 169, 110, 0.34);
      background: rgba(200, 169, 110, 0.09);
      color: var(--gold-light);
      text-align: center;
      font-size: 1.1rem;
      outline: none;
    }

    .pin-input:focus {
      border-color: rgba(200, 169, 110, 0.78);
      box-shadow: 0 0 0 3px rgba(200, 169, 110, 0.16);
    }

    .hint {
      margin: 0;
      color: rgba(236, 228, 215, 0.42);
      letter-spacing: 0.16em;
      font-size: 0.66rem;
      text-transform: uppercase;
    }

    .error {
      min-height: 22px;
      margin-top: 10px;
      color: var(--danger);
      font-size: 0.82rem;
    }

    .grid {
      width: min(860px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      text-align: left;
    }

    .card {
      background: var(--panel);
      border: 1px solid rgba(200, 169, 110, 0.2);
      border-radius: 8px;
      padding: 18px;
      cursor: pointer;
      transition: border-color .25s ease, transform .25s ease, box-shadow .25s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: rgba(200, 169, 110, 0.54);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.32);
    }

    .card h3 {
      margin: 0 0 6px;
      font-weight: 400;
      color: var(--gold-light);
      font-size: 1.04rem;
    }

    .card p {
      margin: 0;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.52;
    }

    .keypad {
      width: min(420px, 100%);
      margin: 24px auto 10px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .key {
      min-height: 58px;
      border-radius: 8px;
      border: 1px solid rgba(200, 169, 110, 0.26);
      background: rgba(200, 169, 110, 0.07);
      color: var(--text);
      cursor: pointer;
      transition: border-color .2s ease, background .2s ease;
    }

    .key:hover {
      border-color: rgba(200, 169, 110, 0.6);
      background: rgba(200, 169, 110, 0.14);
    }

    .key .num { display: block; font-size: 1.08rem; }
    .key .letters { display: block; font-size: 0.58rem; color: var(--muted); letter-spacing: 0.12em; }

    .pin-dots {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 14px 0 8px;
    }

    .dot {
      width: 11px;
      height: 11px;
      border-radius: 999px;
      border: 1px solid rgba(200, 169, 110, 0.4);
      background: rgba(200, 169, 110, 0.08);
    }

    .dot.filled { background: var(--gold-light); border-color: var(--gold); }

    .list {
      width: min(920px, 100%);
      margin: 0 auto;
      text-align: left;
      display: grid;
      gap: 10px;
    }

    .item {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 16px;
      border-radius: 8px;
      border: 1px solid rgba(200, 169, 110, 0.2);
      background: var(--panel);
      color: var(--text);
      text-decoration: none;
      font-size: 0.92rem;
    }

    .item span:last-child {
      color: var(--gold-light);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.68rem;
      white-space: nowrap;
    }

    .top-actions {
      position: fixed;
      top: 20px;
      left: 20px;
      right: 20px;
      display: flex;
      justify-content: space-between;
      pointer-events: none;
    }

    .top-actions a,
    .top-actions button {
      pointer-events: auto;
      border: 1px solid rgba(200, 169, 110, 0.34);
      background: rgba(200, 169, 110, 0.1);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
    }

    .top-actions button:hover,
    .top-actions a:hover { border-color: rgba(200, 169, 110, 0.65); }
  </style>
</head>
<body>
  <div class="top-actions">
    <a href="index.html">Back</a>
    <button id="lockAll" type="button">Lock Archive</button>
  </div>

  <section id="entrance" class="screen active">
    <div class="shell">
      <p class="eyebrow">Access Restricted</p>
      <h1>Harvics World</h1>
      <p class="subtitle">Strategic Intelligence Archive</p>
      <div class="line"></div>
      <button id="playEnter" class="play" type="button" aria-label="Enter Archive">▶</button>
      <p class="cta">Click to Enter</p>
    </div>
  </section>

  <section id="tier1" class="screen">
    <div class="shell">
      <p class="eyebrow">Tier 1 Access</p>
      <h2>Enter Archive Access Code</h2>
      <div class="line"></div>
      <div class="pin-row" id="tier1Row">
        <input class="pin-input" maxlength="1" inputmode="numeric" />
        <input class="pin-input" maxlength="1" inputmode="numeric" />
        <input class="pin-input" maxlength="1" inputmode="numeric" />
        <input class="pin-input" maxlength="1" inputmode="numeric" />
        <input class="pin-input" maxlength="1" inputmode="numeric" />
        <input class="pin-input" maxlength="1" inputmode="numeric" />
      </div>
      <p class="hint">Enter 6-digit code</p>
      <p id="tier1Error" class="error"></p>
    </div>
  </section>

  <section id="categories" class="screen">
    <div class="shell">
      <p class="eyebrow">Strategic Library</p>
      <h2>Select A Domain</h2>
      <div class="line"></div>
      <div class="grid" id="catGrid"></div>
    </div>
  </section>

  <section id="tier2" class="screen">
    <div class="shell">
      <p class="eyebrow">Tier 2 Access</p>
      <h2 id="tier2Title">Enter Domain Access Code</h2>
      <div class="line"></div>
      <div class="pin-dots" id="tier2Dots"></div>
      <div class="keypad" id="keypad"></div>
      <p class="hint">Use keypad to enter 6-digit domain code</p>
      <p id="tier2Error" class="error"></p>
    </div>
  </section>

  <section id="content" class="screen">
    <div class="shell">
      <p class="eyebrow">Archive Index</p>
      <h2 id="contentTitle">Domain Briefings</h2>
      <div class="line"></div>
      <div class="list" id="contentList"></div>
    </div>
  </section>

  <script>
    const data = {
      tier1: "161616",
      master: "161616",
      categories: [
        {
          id: "textile",
          name: "Textile",
          desc: "Sourcing, compliance, quality control, network briefs",
          pin: "161616",
          items: [
            { t: "Global Sourcing Risk Brief — Q2 2026", l: "#", a: "View" },
            { t: "Supply Chain Resilience Playbook", l: "#", a: "Download" },
            { t: "Factory Compliance & QC Standards", l: "#", a: "View" },
            { t: "Lead Time Optimization Model", l: "#", a: "Open" },
            { t: "Margin Compression Analysis — Denim", l: "#", a: "Download" }
          ]
        },
        {
          id: "logistics",
          name: "Logistics",
          desc: "Freight routes, port intelligence, distribution strategy",
          pin: "161616",
          items: [
            { t: "Freight Route Volatility Index", l: "#", a: "View" },
            { t: "Global Shipping Networks Map", l: "#", a: "Download" },
            { t: "Port Capacity & Congestion Report", l: "#", a: "View" },
            { t: "Last-Mile Distribution Strategy", l: "#", a: "Open" }
          ]
        },
        {
          id: "fmcg",
          name: "FMCG",
          desc: "Buyer access, retail network intelligence, category briefs",
          pin: "161616",
          items: [
            { t: "UK Retail Access Network — 171+ Contacts", l: "#", a: "Download" },
            { t: "Category Margin Briefing — Beverages", l: "#", a: "View" },
            { t: "European Buyer Positioning Guide", l: "#", a: "Open" },
            { t: "Compliance Checklist — 50+ Countries", l: "#", a: "Download" }
          ]
        }
      ]
    }

    const screens = {
      entrance: document.getElementById('entrance'),
      tier1: document.getElementById('tier1'),
      categories: document.getElementById('categories'),
      tier2: document.getElementById('tier2'),
      content: document.getElementById('content')
    }

    const lockAllBtn = document.getElementById('lockAll')
    const playEnter = document.getElementById('playEnter')
    const tier1Inputs = [...document.querySelectorAll('#tier1Row .pin-input')]
    const tier1Error = document.getElementById('tier1Error')
    const catGrid = document.getElementById('catGrid')
    const tier2Title = document.getElementById('tier2Title')
    const tier2Error = document.getElementById('tier2Error')
    const tier2Dots = document.getElementById('tier2Dots')
    const keypad = document.getElementById('keypad')
    const contentTitle = document.getElementById('contentTitle')
    const contentList = document.getElementById('contentList')

    let selectedCategory = null
    let tier2Pin = ''

    const keypadKeys = [
      ['1', ''], ['2', 'ABC'], ['3', 'DEF'],
      ['4', 'GHI'], ['5', 'JKL'], ['6', 'MNO'],
      ['7', 'PQRS'], ['8', 'TUV'], ['9', 'WXYZ'],
      ['0', ''], ['⌫', 'CLEAR']
    ]

    function show(screenName) {
      Object.values(screens).forEach(s => s.classList.remove('active'))
      screens[screenName].classList.add('active')
    }

    function setSession(key, value) {
      try { sessionStorage.setItem(key, value) } catch (_) {}
    }

    function getSession(key) {
      try { return sessionStorage.getItem(key) } catch (_) { return null }
    }

    function clearSession() {
      try {
        sessionStorage.removeItem('archive_t1_ok')
        data.categories.forEach(c => sessionStorage.removeItem('archive_t2_' + c.id))
      } catch (_) {}
    }

    function tier1Value() {
      return tier1Inputs.map(i => i.value).join('')
    }

    function bindTier1Inputs() {
      tier1Inputs.forEach((input, idx) => {
        input.addEventListener('input', () => {
          input.value = input.value.replace(/\D/g, '').slice(-1)
          tier1Error.textContent = ''
          if (input.value && idx < tier1Inputs.length - 1) tier1Inputs[idx + 1].focus()

          const pin = tier1Value()
          if (pin.length === 6) {
            if (pin === data.tier1 || pin === data.master) {
              setSession('archive_t1_ok', 'true')
              renderCategories()
              show('categories')
            } else {
              tier1Error.textContent = 'Invalid archive access code.'
              tier1Inputs.forEach(i => i.value = '')
              tier1Inputs[0].focus()
            }
          }
        })

        input.addEventListener('keydown', (e) => {
          if (e.key === 'Backspace' && !input.value && idx > 0) {
            tier1Inputs[idx - 1].focus()
          }
        })
      })
    }

    function renderCategories() {
      catGrid.innerHTML = ''
      data.categories.forEach(cat => {
        const card = document.createElement('button')
        card.type = 'button'
        card.className = 'card'
        card.innerHTML = `<h3>${cat.name}</h3><p>${cat.desc}</p>`
        card.addEventListener('click', () => {
          if (getSession('archive_t1_ok') !== 'true') {
            show('tier1')
            return
          }
          selectedCategory = cat
          tier2Pin = ''
          tier2Title.textContent = `Enter ${cat.name} Access Code`
          tier2Error.textContent = ''
          renderTier2Dots()
          show('tier2')
        })
        catGrid.appendChild(card)
      })
    }

    function renderTier2Dots() {
      tier2Dots.innerHTML = ''
      for (let i = 0; i < 6; i++) {
        const dot = document.createElement('span')
        dot.className = 'dot' + (i < tier2Pin.length ? ' filled' : '')
        tier2Dots.appendChild(dot)
      }
    }

    function renderKeypad() {
      keypad.innerHTML = ''
      keypadKeys.forEach(([num, letters]) => {
        const key = document.createElement('button')
        key.type = 'button'
        key.className = 'key'
        key.innerHTML = `<span class="num">${num}</span>${letters ? `<span class="letters">${letters}</span>` : ''}`

        key.addEventListener('click', () => {
          tier2Error.textContent = ''
          if (!selectedCategory) return

          if (num === '⌫') {
            tier2Pin = tier2Pin.slice(0, -1)
          } else if (/\d/.test(num) && tier2Pin.length < 6) {
            tier2Pin += num
          }

          renderTier2Dots()

          if (tier2Pin.length === 6) {
            if (tier2Pin === selectedCategory.pin || tier2Pin === data.master) {
              setSession('archive_t2_' + selectedCategory.id, 'true')
              renderContent(selectedCategory)
              show('content')
            } else {
              tier2Error.textContent = 'Invalid domain access code.'
              tier2Pin = ''
              renderTier2Dots()
            }
          }
        })

        keypad.appendChild(key)
      })
    }

    function renderContent(category) {
      if (getSession('archive_t1_ok') !== 'true') {
        show('tier1')
        return
      }
      if (getSession('archive_t2_' + category.id) !== 'true') {
        selectedCategory = category
        tier2Pin = ''
        tier2Title.textContent = `Enter ${category.name} Access Code`
        renderTier2Dots()
        show('tier2')
        return
      }

      contentTitle.textContent = `${category.name} Briefings`
      contentList.innerHTML = ''

      category.items.forEach(item => {
        const a = document.createElement('a')
        a.className = 'item'
        a.href = item.l
        a.target = '_blank'
        a.rel = 'noopener noreferrer'
        a.innerHTML = `<span>${item.t}</span><span>${item.a}</span>`
        contentList.appendChild(a)
      })
    }

    playEnter.addEventListener('click', () => {
      show('tier1')
      setTimeout(() => tier1Inputs[0].focus(), 50)
    })

    lockAllBtn.addEventListener('click', () => {
      clearSession()
      selectedCategory = null
      tier2Pin = ''
      tier1Inputs.forEach(i => i.value = '')
      show('entrance')
    })

    bindTier1Inputs()
    renderCategories()
    renderKeypad()

    if (getSession('archive_t1_ok') === 'true') {
      show('categories')
    } else {
      show('entrance')
    }
  </script>
</body>
</html>
